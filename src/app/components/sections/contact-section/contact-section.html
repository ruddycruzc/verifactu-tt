<section id="contacto" class="contact-container">
  <div class="contact-content">
    <div class="contact-info">
      <h2 class="contact-title">
        {{ content.titleLineOne }}
        <br>
        <span>{{ content.titleHighlight }}</span>
      </h2>

      <p class="contact-text">{{ content.description }}</p>

      <div class="info-blocks">
        <div class="info-item">
          <div class="icon-box" aria-hidden="true">
            <svg class="info-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </div>
          <div class="info-text">
            <strong>Email</strong>
            <span>{{ content.email }}</span>
          </div>
        </div>

        <div class="info-item">
          <div class="icon-box" aria-hidden="true">
            <svg class="info-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
          </div>
          <div class="info-text">
            <strong>Oficinas</strong>
            <span>{{ content.office }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="contact-card">
      <form class="contact-form">
        <div class="form-group">
          <input type="text" placeholder="Nombre" required>
        </div>

        <div class="form-group">
          <input type="text" placeholder="Empresa">
        </div>

        <div class="form-row">
          <div class="form-group inline-group">
            <input type="email" placeholder="Email" required>
          </div>

          <div class="form-group inline-group">
            <input type="tel" placeholder="Teléfono">
          </div>
        </div>

        <div class="form-group">
          <textarea placeholder="Mensaje" rows="5"></textarea>
        </div>

        <app-button variant="primary" type="submit" fullWidth>
          Enviar
        </app-button>
      </form>
    </div>
  </div>
</section>
