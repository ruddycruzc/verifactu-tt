<section id="sobre-nosotros" class="about-verifactu-section home-section">

  <div class="about-verifactu-section__container home-section__inner reveal-up">

    <div class="about-verifactu-section__content">

      <h2 class="about-verifactu-section__title">

        {{ content.title }}

        <span>
          {{ content.highlightedWord }}
        </span>

      </h2>

      <p class="about-verifactu-section__description">

        {{ content.description }}

      </p>

      <app-button>

        {{ content.buttonLabel }}

      </app-button>

    </div>

    <div class="about-verifactu-section__gallery" aria-label="Imágenes de VERIFACTU">

      <img
        [src]="content.imageOne"
        [alt]="content.highlightedWord">

      <img
        [src]="content.imageTwo"
        [alt]="content.highlightedWord">

    </div>

  </div>

</section>
