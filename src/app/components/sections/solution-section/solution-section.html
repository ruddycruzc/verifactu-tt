<section id="facturacion" class="solution-section">
  <app-animated-lines-background></app-animated-lines-background>

  <div class="solution-section__header">

    <h2>

      HERRAMIENTA DE

      <span>
        FACTURACIÓN
      </span>

    </h2>

  </div>

  <div class="solution-section__layout">

    @for (
      feature of features;
      track feature.title;
      let index = $index
    ) {

      <div
        class="solution-section__item tt-card-reveal"
        appScrollReveal
        [scrollRevealRootMargin]="'0px 0px -10% 0px'"
        [scrollRevealThreshold]="0.12"
        [style.--reveal-index]="index">
        <app-project-card
          [image]="feature.media"
          [mediaType]="feature.mediaType"
          [imageAlt]="feature.title"
          [title]="feature.title"
          [description]="feature.description"
          [showButton]="false">
        </app-project-card>
      </div>

    }

  </div>

</section>
