<div class="hero-content">
  <h1 class="hero-content__title">
    {{ title }}
  </h1>

  <p class="hero-content__subtitle">
    {{ subtitle }}

    <span class="hero-content__highlight">
      {{ highlightedWord }}
    </span>
  </p>

  <div class="hero-content__actions">
    <app-button href="#contacto">
      {{ primaryButton }}
    </app-button>

    <app-button variant="secondary" href="#facturacion">
      {{ secondaryButton }}
    </app-button>
  </div>
</div>
