<footer class="footer">

  <div class="footer__container">

    <div class="footer__brand">

      <h3>
        VERIFACTU
      </h3>

      <p>
        Soluciones de facturación adaptadas a la normativa AEAT.
      </p>

    </div>

    <nav>

      <ul class="footer__links">

        @for (
          link of links;
          track link.href
        ) {

          <li>

            <a
              [href]="link.href">

              {{ link.label }}

            </a>

          </li>

        }

      </ul>

    </nav>

  </div>

  <div class="footer__bottom">

    © {{ currentYear }}
    Táctica TIC

  </div>

</footer>
